<!DOCTYPE html>
<html>
<head>
    <title>Advanced Molecular Analyzer</title>

    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f0f9ff, #ffffff);
            color: #0f172a;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 40px;
            color: #0ea5e9;
            margin-bottom: 20px;
        }

        input {
            width: 60%;
            padding: 12px;
            margin: 10px;
            border-radius: 10px;
            border: 1px solid #cbd5f5;
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        button {
            padding: 12px 25px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            color: white;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .box {
            background: white;
            padding: 30px;
            margin-top: 30px;
            border-radius: 20px;
            width: 80%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }

        #viewer {
            width: 700px;
            height: 500px;
            margin: auto;
            border-radius: 15px;
            border: 2px solid #0ea5e9;
            margin-top: 20px;
        }

        .chem-bg {
            position: fixed;
            font-size: 80px;
            opacity: 0.05;
            top: 10%;
            left: 5%;
        }

        .chem-bg2 {
            position: fixed;
            font-size: 100px;
            opacity: 0.05;
            bottom: 10%;
            right: 5%;
        }
    </style>
</head>

<body>

<div class="chem-bg">⚗️</div>
<div class="chem-bg2">🧪</div>

<h1>🧬 Advanced Molecular Analyzer</h1>

<form method="POST">
    <input type="text" name="name" placeholder="Enter Compound Name"><br>
    <input type="text" name="smiles" placeholder="Enter SMILES (optional)"><br>
    <button type="submit">Analyze</button>
</form>

{% if output %}
<div class="box">

    <h2>🧪 Compound: {{ name }}</h2>

    <h3>🔬 Results:</h3>
    <pre>{{ output }}</pre>

    <h3>🧪 2D Structure:</h3>
    <img src="data:image/png;base64,{{ img }}" width="300">

    <h3>🧊 3D Structure:</h3>
    <div id="viewer"></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    let viewer = $3Dmol.createViewer("viewer", {
        backgroundColor: "white"
    });

    let molData = `{{ molblock | safe }}`;

    if (molData) {
        viewer.addModel(molData, "mol");

        viewer.setStyle({}, {
            stick: {radius: 0.2},
            sphere: {scale: 0.3}
        });

        viewer.zoomTo();
        viewer.render();
    }

});
</script>

{% endif %}

</body>
</html>
